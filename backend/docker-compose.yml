version: "3.9"

services:
  backend:
    build: .
    container_name: trc_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: trc_postgres
    restart: always
    environment:
      POSTGRES_USER: trc_user
      POSTGRES_PASSWORD: trc_pass
      POSTGRES_DB: trc_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: